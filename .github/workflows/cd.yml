# Order Health Observability: Continuous Delivery (ADR-0005, Alternative B).
#
# Builds the backend and frontend images, pushes them to GHCR, and deploys the
# Docker Compose stack onto a cloud VM over SSH. The VM reaches internal NAV
# read-only and the middleware read-only endpoints over an OWNED, MONITORED
# VPN/tunnel (ADR-0005). That VPN, the VM, and every secret below are DevOps
# provisioning work; see docs/deploy.md.
#
# This workflow is INERT until the GitHub Environment "production" is created
# with required reviewers and the deploy secrets are set. The build-and-push job
# only publishes images (no secrets, no deploy). The deploy job is gated by the
# "production" environment, so it cannot run until a reviewer approves, and it
# cannot reach any host until DEPLOY_SSH_* are provisioned. Nothing here deploys
# on its own.
name: CD

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Least privilege: read the repo, and write packages so images can be pushed to
# GHCR using the built-in GITHUB_TOKEN (no external registry secret needed).
permissions:
  contents: read
  packages: write

# Never deploy two revisions to the same target at once. Do not cancel a deploy
# in flight (a half-applied compose up is worse than a queued one).
concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/grundens-it/order-health-backend
  FRONTEND_IMAGE: ghcr.io/grundens-it/order-health-frontend

jobs:
  build-and-push:
    name: Build and push images to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build context is the repo root for both images (npm workspaces install),
      # matching the Unit 9 Dockerfiles. Tag each image by commit SHA (the exact
      # revision the deploy pins) and by latest.
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production VM over SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    # THE GATE. The "production" environment must be created with required
    # reviewers before this job can run, and it carries the DEPLOY_SSH_* secrets.
    # Until then this job cannot deploy: it waits for approval, and the SSH step
    # has no host or key to connect with. See docs/deploy.md.
    environment: production
    steps:
      # Ship the current compose manifest and the migration SQL to the VM. These
      # are the deploy manifest, not secrets. The app source config (DATABASE_URL,
      # MIDDLEWARE_*, NAV_*, cadence, AGGREGATOR_ENABLED) is NOT sent: it lives in
      # order-health.env, which the VM holds and CD never touches.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose manifest to the VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_SSH_PORT || '22' }}
          target: ${{ vars.DEPLOY_DIR || '/opt/order-health' }}
          source: |
            docker-compose.yml
            docker-compose.prod.yml
            db/migrations/0001_init.sql

      # Pull the images (with the run's ephemeral GITHUB_TOKEN, valid on the VM
      # for this run only) and bring the stack up, then apply the idempotent
      # migration. IMAGE_TAG pins the exact commit built above.
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/opt/order-health' }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_SSH_PORT || '22' }}
          envs: DEPLOY_DIR,GHCR_USER,GHCR_TOKEN,IMAGE_TAG
          script: |
            set -euo pipefail
            cd "$DEPLOY_DIR"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            export IMAGE_TAG
            compose="docker compose --env-file order-health.env -f docker-compose.yml -f docker-compose.prod.yml"
            $compose pull
            $compose up -d
            $compose run --rm migrate
            docker logout ghcr.io
