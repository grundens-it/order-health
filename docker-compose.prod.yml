# Order Health Observability: production override (ADR-0005, Alternative B).
#
# Layered ON TOP of the Unit 9 local compose. The CD workflow runs, on the VM:
#
#   docker compose --env-file order-health.env \
#     -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this override changes vs the local dev compose (docker-compose.yml):
#   - backend and frontend run the images CD published to GHCR, pinned to the
#     built commit by IMAGE_TAG (default latest), instead of building locally.
#   - the real app source config is read from order-health.env, an environment
#     file the VM holds and that is NEVER committed (DATABASE_URL, MIDDLEWARE_*,
#     NAV_*, cadence knobs, AGGREGATOR_ENABLED). No secret or host appears here.
#   - every service restarts unless-stopped, so the stack survives a VM reboot.
#   - Postgres is not published on any new interface; it stays on the internal
#     compose network, reached only by backend/migrate via the "db" service name.
#
# How config flows (two mechanisms, both fed by the SAME order-health.env):
#   1. --env-file order-health.env drives ${...} substitution in the compose
#      files, so the base file's DATABASE_URL, AGGREGATOR_ENABLED and the cron
#      knobs resolve to the VM's real values instead of the local-dev defaults.
#   2. env_file injects the full config surface (MIDDLEWARE_*, NAV_*, the Ops
#      threshold knobs) into each container. The file is required: compose fails
#      loudly until the VM is provisioned, which is the point.
#
# Postgres exposure note: the base file publishes 5432 for local dev, and a
# compose override cannot remove a published port (compose concatenates ports).
# So the authoritative control that keeps Postgres off the public internet is
# the VM firewall / cloud security group, which must expose ONLY the web port
# and block 5432 and 8080 from outside. See docs/deploy.md.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB come from order-health.env.
    env_file:
      - order-health.env

  migrate:
    image: postgres:16
    restart: "no"
    # DATABASE_URL is supplied by order-health.env via --env-file substitution;
    # the migration SQL is copied to the VM by CD (db/migrations, mounted ro).
    env_file:
      - order-health.env

  backend:
    image: ghcr.io/grundens-it/order-health-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - order-health.env

  frontend:
    image: ghcr.io/grundens-it/order-health-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - order-health.env
